name: 🚀 Enterprise CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - staging
      - release/**
      - feature/**
      - hotfix/**

  pull_request:
    branches:
      - main
      - develop

  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write
  id-token: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22
  PNPM_VERSION: 10
  CI: true

jobs:

  validate:
    name: Validate Repository

    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get PNPM Store Directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache PNPM Store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install Dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Verify Workspace
        run: |
          pnpm --version
          node --version
          pnpm list --depth 0

      - name: Check Lockfile
        run: |
          git diff --exit-code pnpm-lock.yaml

  lint:
    name: ESLint

    runs-on: ubuntu-latest

    needs:
      - validate

    timeout-minutes: 15

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: |
          pnpm turbo run lint

  typecheck:
    name: TypeScript Type Check

    runs-on: ubuntu-latest

    needs:
      - validate

    timeout-minutes: 20

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Run Type Check
        run: |
          pnpm turbo run typecheck

  build:
    name: Build Applications

    runs-on: ubuntu-latest

    needs:
      - lint
      - typecheck

    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        app:
          - admin-web
          - customer-web
          - temp-akshay

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Build ${{ matrix.app }}
        run: |
          pnpm turbo run build --filter=${{ matrix.app }}

      - name: Upload Build Logs (Failure Only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.app }}
          path: |
            **/*.log
            **/npm-debug.log*
            **/pnpm-debug.log*
            .turbo
          if-no-files-found: ignore
          retention-days: 7

  artifacts:
    name: Upload Build Artifacts

    runs-on: ubuntu-latest

    needs:
      - build

    timeout-minutes: 10

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Package Build Outputs
        run: |
          mkdir -p artifacts

          if [ -d "apps/admin-web/.next" ]; then
            tar -czf artifacts/admin-web.tar.gz apps/admin-web/.next
          fi

          if [ -d "apps/customer-web/.next" ]; then
            tar -czf artifacts/customer-web.tar.gz apps/customer-web/.next
          fi

          if [ -d "temp-akshay/dist" ]; then
            tar -czf artifacts/backend.tar.gz temp-akshay/dist
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: application-builds
          path: artifacts
          if-no-files-found: ignore
          retention-days: 7

  summary:
    name: Workflow Summary

    runs-on: ubuntu-latest

    needs:
      - artifacts

    steps:

      - name: Generate Summary
        run: |
          echo "## ✅ Enterprise CI Pipeline Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Installation | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Workspace Validation | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Check | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact Upload | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 CI completed successfully." >> $GITHUB_STEP_SUMMARY