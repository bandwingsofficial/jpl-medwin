name: 🚀 Deploy Admin Web

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "apps/admin-web/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "turbo.json"
      - ".github/workflows/deploy-admin.yml"

permissions:
  contents: read

concurrency:
  group: deploy-admin-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22
  PNPM_VERSION: 10

jobs:

  deploy:

    name: Deploy Admin

    runs-on: ubuntu-latest

    timeout-minutes: 30

    environment:
      name: production

    defaults:
      run:
        working-directory: .

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Restore Turbo Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Build Admin
        run: |
          pnpm turbo run build --filter=admin-web

      - name: Install Vercel CLI
        run: |
          npm install --global vercel@latest

      - name: Pull Vercel Environment
        run: |
          vercel pull \
            --yes \
            --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/admin-web
        env:
          VERCEL_ORG_ID: ${{ secrets.ADMIN_VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.ADMIN_VERCEL_PROJECT_ID }}

      - name: Build Vercel Output
        run: |
          vercel build \
            --prod \
            --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/admin-web
        env:
          VERCEL_ORG_ID: ${{ secrets.ADMIN_VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.ADMIN_VERCEL_PROJECT_ID }}

      - name: Deploy Production
        run: |
          vercel deploy \
            --prebuilt \
            --prod \
            --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/admin-web
        env:
          VERCEL_ORG_ID: ${{ secrets.ADMIN_VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.ADMIN_VERCEL_PROJECT_ID }}

      - name: Deployment Summary
        run: |
          echo "## 🚀 Admin Deployment Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Production |" >> $GITHUB_STEP_SUMMARY