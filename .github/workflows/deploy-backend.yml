name: 🚀 Deploy Backend

on:
  workflow_dispatch:

  push:
    branches:
      - main

    paths:
      - "temp-akshay/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "turbo.json"
      - ".github/workflows/deploy-backend.yml"

permissions:
  contents: read

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22
  PNPM_VERSION: 10

jobs:

  deploy:

    name: Deploy NestJS Backend

    runs-on: ubuntu-latest

    timeout-minutes: 40

    environment:
      name: production

    defaults:
      run:
        working-directory: .

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Restore Turbo Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Generate Prisma Client
        working-directory: temp-akshay
        run: |
          pnpm prisma generate

      - name: Run Prisma Migrations
        working-directory: temp-akshay
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          pnpm prisma migrate deploy

      - name: Build Backend
        run: |
          pnpm turbo run build --filter=temp-akshay

      - name: Verify Build Output
        run: |
          test -d temp-akshay/dist

      - name: Install Railway CLI
        run: |
          npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service backend

      - name: Wait For Deployment
        run: sleep 20

      - name: Health Check
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          curl \
            --fail \
            --show-error \
            --silent \
            ${BACKEND_URL}/health

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: |
            temp-akshay/dist
          retention-days: 7

      - name: Deployment Summary
        run: |
          echo "## 🚀 Backend Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Install | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Prisma Generate | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Prisma Migration | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Railway Deploy | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Health Check | ✅ |" >> $GITHUB_STEP_SUMMARY